name: AI Security Analyzer

on:
  workflow_run:
    workflows:
      - "OWASP ZAP DAST Scan"
    types:
      - completed

jobs:
  security-report:
    name: Generate AI Security Report
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Download ZAP report
        run: |
          ARTIFACTS_URL="https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts"
          curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" $ARTIFACTS_URL > zap-artifacts.json

          ZAP_URL=$(python3 -c "
          import json
          try:
              with open('zap-artifacts.json') as f:
                  data = json.load(f)
              for a in data.get('artifacts', []):
                  if a['name'] == 'zap-report':
                      print(a['archive_download_url'])
                      break
          except Exception as e:
              print('')
          ")

          if [ -n "$ZAP_URL" ]; then
              echo "Downloading ZAP report..."
              curl -s -L -H "Authorization: token ${{ secrets.GH_PAT }}" "$ZAP_URL" -o zap-report.zip
              unzip -o zap-report.zip -d zap-report/ || true
              ls zap-report/ || true
          else
              echo "No ZAP report found"
              mkdir -p zap-report
          fi

      - name: Download Test Backend security reports
        run: |
          RUNS_URL="https://api.github.com/repos/${{ github.repository }}/actions/workflows/test-backend.yml/runs?head_sha=${{ github.event.workflow_run.head_sha }}&per_page=1"
          curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" $RUNS_URL > backend-runs.json

          RUN_ID=$(python3 -c "
          import json
          try:
              with open('backend-runs.json') as f:
                  data = json.load(f)
              runs = data.get('workflow_runs', [])
              if runs:
                  print(runs[0]['id'])
          except Exception:
              pass
          ")

          if [ -n "$RUN_ID" ]; then
              echo "Found Test Backend run: $RUN_ID"
              ARTIFACTS_URL="https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts"
              curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" $ARTIFACTS_URL > backend-artifacts.json

              ARTIFACT_URL=$(python3 -c "
          import json
          try:
              with open('backend-artifacts.json') as f:
                  data = json.load(f)
              for a in data.get('artifacts', []):
                  if a['name'] == 'security-reports':
                      print(a['archive_download_url'])
                      break
          except Exception:
              pass
          ")

              if [ -n "$ARTIFACT_URL" ]; then
                  echo "Downloading security reports..."
                  curl -s -L -H "Authorization: token ${{ secrets.GH_PAT }}" "$ARTIFACT_URL" -o security-reports.zip
                  unzip -o security-reports.zip -d security-reports/ || true
                  ls security-reports/ || true
              else
                  echo "No security reports found"
                  mkdir -p security-reports
              fi
          else
              echo "No Test Backend run found for this commit"
              mkdir -p security-reports
          fi



      - name: Download Trivy image report
        run: |
          # Find the latest Test Docker Compose run for this commit
          RUNS_URL="https://api.github.com/repos/${{ github.repository }}/actions/workflows/test-docker-compose.yml/runs?head_sha=${{ github.event.workflow_run.head_sha }}&per_page=1"
          curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" $RUNS_URL > docker-runs.json

          RUN_ID=$(python3 -c "
          import json
          try:
              with open('docker-runs.json') as f:
                  data = json.load(f)
              runs = data.get('workflow_runs', [])
              if runs:
                  print(runs[0]['id'])
          except Exception:
              pass
          ")

          if [ -n "$RUN_ID" ]; then
              echo "Found Test Docker Compose run: $RUN_ID"
              ARTIFACTS_URL="https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts"
              curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" $ARTIFACTS_URL > docker-artifacts.json

              ARTIFACT_URL=$(python3 -c "
          import json
          try:
              with open('docker-artifacts.json') as f:
                  data = json.load(f)
              for a in data.get('artifacts', []):
                  if a['name'] == 'trivy-image-report':
                      print(a['archive_download_url'])
                      break
          except Exception:
              pass
          ")

              if [ -n "$ARTIFACT_URL" ]; then
                  echo "Downloading Trivy image report..."
                  curl -s -L -H "Authorization: token ${{ secrets.GH_PAT }}" "$ARTIFACT_URL" -o trivy-report.zip
                  unzip -o trivy-report.zip -d security-reports/ || true
                  ls security-reports/ || true
              else
                  echo "No Trivy image report found"
              fi
          else
              echo "No Test Docker Compose run found for this commit"
          fi    

      - name: Read security reports
        run: |
          # Read Bandit report
          if [ -f security-reports/bandit-report.json ]; then
            BANDIT=$(python3 -c "
          import json
          try:
              with open('security-reports/bandit-report.json') as f:
                  data = json.load(f)
              if isinstance(data, dict):
                  results = data.get('results', [])
                  issues = [f\"{r['issue_severity']} - {r['issue_text']} in {r['filename']}:{r['line_number']}\" for r in results[:10]]
                  print('\n'.join(issues) if issues else 'No issues found')
              else:
                  print('Invalid Bandit report format')
          except Exception as e:
              print(f'Could not parse Bandit report: {e}')
          " 2>/dev/null || echo "Bandit report parse error")
          else
            BANDIT="Bandit report not available"
          fi

          # Read pip-audit report
          if [ -f security-reports/pip-audit-report.json ]; then
            PIPAUDIT=$(python3 -c "
          import json
          try:
              with open('security-reports/pip-audit-report.json') as f:
                  data = json.load(f)
              vulns = []
              if isinstance(data, list):
                  for dep in data:
                      for v in dep.get('vulns', []):
                          vulns.append(f\"{dep['name']} {dep['version']}: {v['id']} - {v['description'][:100]}\")
              print('\n'.join(vulns[:10]) if vulns else 'No vulnerabilities found')
          except Exception as e:
              print(f'Could not parse pip-audit report: {e}')
          " 2>/dev/null || echo "pip-audit report parse error")
          else
            PIPAUDIT="pip-audit report not available"
          fi

          # Read Trivy report
          if [ -f security-reports/trivy-image-report.json ]; then
            TRIVY=$(python3 -c "
          import json
          try:
              with open('security-reports/trivy-image-report.json') as f:
                  data = json.load(f)
              vulns = []
              if isinstance(data, dict):
                  for result in data.get('Results', []):
                      for v in result.get('Vulnerabilities', [])[:5]:
                          vulns.append(f\"{v.get('Severity','?')} - {v.get('VulnerabilityID','?')}: {v.get('Title','?')[:80]}\")
              print('\n'.join(vulns[:10]) if vulns else 'No vulnerabilities found')
          except Exception as e:
              print(f'Could not parse Trivy report: {e}')
          " 2>/dev/null || echo "Trivy report parse error")
          else
            TRIVY="Trivy report not available"
          fi

          if [ -f zap-report/report_html.html ]; then
            ZAP="OWASP ZAP scan completed - dynamic security testing performed"
          else
            ZAP="ZAP report not available"
          fi

          echo "BANDIT_RESULTS<<EOF" >> $GITHUB_ENV
          echo "$BANDIT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "TRIVY_RESULTS<<EOF" >> $GITHUB_ENV
          echo "$TRIVY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "PIPAUDIT_RESULTS<<EOF" >> $GITHUB_ENV
          echo "$PIPAUDIT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "ZAP_RESULTS<<EOF" >> $GITHUB_ENV
          echo "$ZAP" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Run AI Security Analyzer
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.workflow_run.head_sha }}
          PR_NUMBER: ""
          BANDIT_RESULTS: ${{ env.BANDIT_RESULTS }}
          TRIVY_RESULTS: ${{ env.TRIVY_RESULTS }}
          ZAP_RESULTS: ${{ env.ZAP_RESULTS }}
          SONAR_RESULTS: "SonarQube analysis completed - check sonarcloud.io for details"
        run: python agents/security_analyzer.py