name: Test Docker Compose

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:

  test-docker-compose:
    runs-on: ubuntu-latest
    env:
      DOCKER_IMAGE_BACKEND: ci-backend
      DOCKER_IMAGE_FRONTEND: ci-frontend
      TAG: latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - run: docker compose build
      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ci-backend:latest
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore
          format: json
          output: trivy-image-report.json


      - name: Show vulnerabilities
        if: always()
        run: |
          cat trivy-full-report.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for result in data.get('Results', []):
              for v in result.get('Vulnerabilities', []):
                  print(f\"{v.get('Severity')} | {v.get('VulnerabilityID')} | {v.get('PkgName')} | {v.get('InstalledVersion')} -> {v.get('FixedVersion')}\")
          " || echo "No vulnerabilities found or parse error"

      - name: Upload full Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-full-report
          path: trivy-full-report.json
          retention-days: 1

      - run: docker compose down -v --remove-orphans
      - run: docker compose up -d --wait backend frontend adminer
      - name: Test backend is up
        run: curl http://localhost:8000/api/v1/utils/health-check
      - name: Test frontend is up
        run: curl http://localhost:5173
      - run: docker compose down -v --remove-orphans
