name: OWASP ZAP DAST Scan

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  zap-scan:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      #- name: Create .env file
      #  run: |
      #    cp .env.example .env

      - name: Start app with Docker Compose
        run: |
          docker compose up -d --build
        
      - name: Wait for app to be healthy
        run: |
          echo "Waiting for backend to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:8000/api/v1/utils/health-check/ | grep -q "true"; then
              echo "App is ready!"
              break
            fi
            echo "Attempt $i/30 - not ready yet, waiting 10s..."
            sleep 10
          done

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:8000"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"
          fail_action: false  # Don't fail the build on alerts (yet)
        continue-on-error: true

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html

      - name: Stop Docker Compose
        if: always()
        run: docker compose down