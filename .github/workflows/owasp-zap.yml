name: OWASP ZAP DAST Scan

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  zap-scan:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest
    env:
      DOMAIN: localhost
      STACK_NAME: my-app
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      FIRST_SUPERUSER: ${{ secrets.FIRST_SUPERUSER }}
      FIRST_SUPERUSER_PASSWORD: ${{ secrets.FIRST_SUPERUSER_PASSWORD }}
      POSTGRES_SERVER: ${{ secrets.DOCKER_IMAGE_FRONTEND }}
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      DOCKER_IMAGE_BACKEND: ${{ secrets.DOCKER_IMAGE_BACKEND }}
      DOCKER_IMAGE_FRONTEND: ${{ secrets.DOCKER_IMAGE_FRONTEND }}
      FRONTEND_HOST: ${{ secrets.FRONTEND_HOST }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      #- name: Create .env file
      #  run: |
      #    cp .env.example .env

      - name: Start app with Docker Compose
        run: |
          docker compose up -d --build
        
      - name: Wait for app to be healthy
        run: |
          echo "Waiting for backend to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:8000/api/v1/utils/health-check/ | grep -q "true"; then
              echo "App is ready!"
              break
            fi
            echo "Attempt $i/30 - not ready yet, waiting 10s..."
            sleep 10
          done

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:8000"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"
          fail_action: false  # Don't fail the build on alerts (yet)
        continue-on-error: true

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html

      - name: Stop Docker Compose
        if: always()
        run: docker compose down