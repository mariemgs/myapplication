name: AI Orchestrator

on:
  workflow_dispatch:

jobs:
  orchestrate:
    name: Run AI Orchestrator
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip3 install langgraph langchain langchain-groq langchain-core requests

      - name: Download security reports
        uses: actions/download-artifact@v4
        with:
          name: security-reports
          path: security-reports/
        continue-on-error: true

      - name: Download ZAP report
        uses: actions/download-artifact@v4
        with:
          name: zap-report
          path: zap-report/
        continue-on-error: true

      - name: Run AI Orchestrator
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          PROMETHEUS_URL: ${{ secrets.PROMETHEUS_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python3 -m agents.orchestrator

      - name: Upload orchestrator report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-report-${{ github.run_number }}
          path: orchestrator-report/
          retention-days: 30