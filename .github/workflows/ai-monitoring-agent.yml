name: AI Monitoring Agent

on:
  schedule:
    - cron: '0 9 * * *'  # Once a day at 9am 
  workflow_dispatch: 

jobs:
  monitor:
    name: Monitor App Health
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests langchain-groq langchain-core

      - name: Run AI Monitoring Agent
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Localhost usually works better for self-hosted runners on the same machine
          PROMETHEUS_URL: "http://localhost:9090" 
        run: python agents/monitoring_agent.py