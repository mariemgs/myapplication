name: Pipeline Summary

on:
  workflow_run:
    workflows:
      - "CI"
      - "Deploy to Staging"
      - "SonarQube Analysis"
      - "OWASP ZAP DAST Scan"
      - "Playwright Tests"
      - "AI Failure Analyzer"
    types:
      - completed

jobs:
  summary:
    name: Generate Pipeline Summary
    runs-on: ubuntu-latest

    steps:
      - name: Generate Summary
        run: |
          echo "# 🚀 DevSecOps Pipeline Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Tool | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Unit & Integration Tests | Pytest | ${{ github.event.workflow_run.name == 'CI' && github.event.workflow_run.conclusion == 'success' && '✅ success' || github.event.workflow_run.name == 'CI' && '❌ failed' || '⏭️ skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 SAST | Bandit | ✅ included in CI |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Container Scan | Trivy | ✅ included in CI |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 Code Quality | SonarQube | ${{ github.event.workflow_run.name == 'SonarQube Analysis' && github.event.workflow_run.conclusion == 'success' && '✅ success' || github.event.workflow_run.name == 'SonarQube Analysis' && '❌ failed' || '⏭️ skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 DAST | OWASP ZAP | ${{ github.event.workflow_run.name == 'OWASP ZAP DAST Scan' && github.event.workflow_run.conclusion == 'success' && '✅ success' || github.event.workflow_run.name == 'OWASP ZAP DAST Scan' && '❌ failed' || '⏭️ skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎭 E2E Tests | Playwright | ${{ github.event.workflow_run.name == 'Playwright Tests' && github.event.workflow_run.conclusion == 'success' && '✅ success' || github.event.workflow_run.name == 'Playwright Tests' && '❌ failed' || '⏭️ skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Deploy | Docker Compose | ${{ github.event.workflow_run.name == 'Deploy to Staging' && github.event.workflow_run.conclusion == 'success' && '✅ success' || github.event.workflow_run.name == 'Deploy to Staging' && '❌ failed' || '⏭️ skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🤖 AI Analysis | Gemini | ${{ github.event.workflow_run.name == 'AI Failure Analyzer' && github.event.workflow_run.conclusion == 'success' && '✅ success' || github.event.workflow_run.name == 'AI Failure Analyzer' && '❌ failed' || '⏭️ skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.event.workflow_run.head_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.event.workflow_run.head_branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** \`${{ github.event.workflow_run.event }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** [${{ github.event.workflow_run.id }}](${{ github.event.workflow_run.html_url }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Generated by DevSecOps Pipeline • Powered by GitHub Actions*" >> $GITHUB_STEP_SUMMARY