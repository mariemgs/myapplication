name: Test Backend

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  test-backend:
    runs-on: ubuntu-latest
    env:
      DOMAIN: localhost
      STACK_NAME: my-app
      SECRET_KEY: changeme
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: changeme
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
      DOCKER_IMAGE_BACKEND: backend
      DOCKER_IMAGE_FRONTEND: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # 1. Start Services
      # Ensure --build is used to include the 'tests' folder from your Dockerfile
      - name: Pre-test cleanup
        run: |
          sudo rm -rf ./backend/htmlcov || true
          sudo chown -R $USER:$USER . || true
      - name: Checkout
        uses: actions/checkout@v6
      - name: Start Services
        run: |
          docker compose down -v --remove-orphans
          docker compose up -d db mailcatcher backend --build

      # 2. Run Database Migrations
      - name: Migrate DB
        run: docker compose exec -T backend bash scripts/prestart.sh

      # 3. Run Tests
      - name: Run tests
        run: docker compose exec -T backend uv run bash scripts/tests-start.sh "Coverage for ${{ github.sha }}"
        
      # 4. Extract Coverage (Fixed Permissions & Path)
      - name: Copy coverage from container
        if: always()
        run: |
          # Create directory with user permissions
          mkdir -p ./backend/htmlcov
          # Copy from container (which runs as root)
          docker cp $(docker compose ps -q backend):/app/backend/htmlcov/. ./backend/htmlcov
          # Give ownership back to the user so GitHub can upload it
          sudo chown -R $USER:$USER ./backend/htmlcov

      # 5. Security Scans
      - name: Run SAST (Bandit)
        run: |
          pip install bandit
          # Scanning the local backend directory on the runner host
          bandit -r backend -ll -f json -o bandit-report.json || true
          bandit -r backend -ll || true

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          pip install pip-audit
          # Pointing to the requirements/dependencies in the backend folder
          pip-audit -f json -o pip-audit-report.json || true

      - name: Secrets scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6. Artifact Uploads
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.json
          retention-days: 1

      - name: Store coverage files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: backend/htmlcov
          
      # 7. Final Coverage Check & Cleanup
      - name: Coverage report check
        run: docker compose exec -T backend uv run coverage report --fail-under=90

      - name: Stop Services
        if: always()
        run: docker compose down -v --remove-orphans