name: Test Backend

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  test-backend:
    runs-on: ubuntu-latest
    # Define required variables for your docker-compose.yml placeholders
    env:
      DOMAIN: localhost
      STACK_NAME: my-app
      SECRET_KEY: changeme
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: changeme
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
      DOCKER_IMAGE_BACKEND: backend
      DOCKER_IMAGE_FRONTEND: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Updated to v4 (v6 doesn't exist)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # 1. Start the backend infrastructure
      # We must start 'backend' so we can 'exec' into it later
      - name: Start Services
        run: |
          docker compose down -v --remove-orphans
          docker compose up -d db mailcatcher backend --build

      # 2. Run Database Migrations
      - name: Migrate DB
        run: docker compose exec -T backend bash scripts/prestart.sh

      # 3. Run Tests
      - name: Run tests
        # Pytest will now find the 'tests/' folder because you are in /app/backend/
        run: docker compose exec -T backend uv run bash scripts/tests-start.sh "Coverage for ${{ github.sha }}"
        
      # 4. Extract Coverage
      - name: Copy coverage from container
        # Source: /app/backend/htmlcov
        # Destination: ./backend/htmlcov (on the GitHub Runner)
        run: docker cp $(docker compose ps -q backend):/app/backend/htmlcov ./backend/htmlcov
      # 5. Security Scans
      # These run on the GitHub Runner Host
      - name: Run SAST (Bandit)
        run: |
          pip install bandit
          bandit -r backend -ll -f json -o bandit-report.json || true
          bandit -r backend -ll || true

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -f json -o pip-audit-report.json || true

      - name: Secrets scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6. Artifact Uploads
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.json
          retention-days: 1

      - name: Store coverage files
        uses: actions/upload-artifact@v4 # Updated from v6 to v4
        with:
          name: coverage-html
          path: backend/htmlcov
          include-hidden-files: true

      # 7. Final Coverage Check & Cleanup
      - name: Coverage report
        run: docker compose exec -T backend uv run coverage report --fail-under=90

      - name: Stop Services
        if: always()
        run: docker compose down -v --remove-orphans