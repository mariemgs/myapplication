version: 2
updates:
  # 1. GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 1
    groups:
      actions-all:
        patterns: ["*"]
    commit-message:
      prefix: "⬆"
    labels: ["dependencies", "internal"]

  # 2. Python (Backend)
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 1
    groups:
      python-all:
        patterns: ["*"]
    commit-message:
      prefix: "⬆"
    labels: ["dependencies", "internal"]

  # 3. Bun (Frontend)
  - package-ecosystem: "bun"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "@hey-api/openapi-ts"
    groups:
      frontend-all:
        patterns: ["*"]
    commit-message:
      prefix: "⬆"
    labels: ["dependencies", "internal"]

  # 4. Docker
  - package-ecosystem: "docker"
    directories:
      - "/backend"
      - "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 1
    groups:
      docker-all:
        patterns: ["*"]
    commit-message:
      prefix: "⬆"
    labels: ["dependencies", "internal"]

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "⬆"
    labels: ["dependencies", "internal"]