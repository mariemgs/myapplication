version: 2
updates:
  # GitHub Actions - Grouped to keep your PR list clean
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly" # Daily is usually too much for Actions
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "⬆"
    labels: ["dependencies", "internal"]

  # Python uv - Pointed to your actual backend folder
  - package-ecosystem: "uv"
    directory: "/backend" # Adjusted to match your project structure
    schedule:
      interval: "weekly"
    groups:
      python-deps:
        patterns:
          - "*"
    commit-message:
      prefix: "⬆"
    labels: ["dependencies", "internal"]

  # Bun / Frontend
  - package-ecosystem: "bun"
    directory: "/frontend" # Adjusted to match your project structure
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "@hey-api/openapi-ts"
    groups:
      frontend-deps:
        patterns:
          - "*"
    commit-message:
      prefix: "⬆"
    labels: ["dependencies", "internal"]

  # Docker & Docker Compose
  - package-ecosystem: "docker"
    directories:
      - "/backend"
      - "/frontend"
    schedule:
      interval: "weekly"
    groups:
      docker-images:
        patterns:
          - "*"
    commit-message:
      prefix: "⬆"
    labels: ["dependencies", "internal"]

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "⬆"
    labels: ["dependencies", "internal"]