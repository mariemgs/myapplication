sonar.organization=mariemgs
sonar.projectKey=mariemgs_myapplication
sonar.projectName=full-stack-fastapi-template

# Source and test paths
sonar.sources=backend/app
sonar.tests=backend/tests

# Python coverage report (generated by pytest)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/migrations/**,**/alembic/**,frontend/node_modules/**
sonar.test.exclusions=**/tests/**sonar.coverage.exclusions=**/agents.py,**/main.py,**/initial_data.py,**/tests_pre_start.py,**/backend_pre_start.py
